<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logo Setup Tool — Deeply Rooted</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; background: #0d1a0f; color: white; flex-direction: column; gap: 1.5rem; }
  h2 { color: #b89137; margin: 0; }
  .card { background: #162012; border: 1px solid rgba(184,145,55,0.3); border-radius: 16px;
          padding: 2rem; max-width: 500px; width: 90%; text-align: center; }
  .status { padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold; margin-top: 1rem; }
  .success { background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: #86efac; }
  .error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #fca5a5; }
  .btn { background: #b89137; color: #0d1a0f; border: none; padding: 0.8rem 2rem;
         border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer;
         transition: all 0.2s; margin-top: 1rem; }
  .btn:hover { background: #d4a845; transform: translateY(-2px); }
  img#preview { width: 160px; height: 160px; object-fit: contain; border-radius: 50%;
                background: white; padding: 12px; box-shadow: 0 0 30px rgba(184,145,55,0.5); }
</style>
</head>
<body>
<div class="card">
  <h2>🌿 Logo Setup</h2>
  <p style="color:rgba(255,255,255,0.7); margin: 0.5rem 0 1.5rem;">This tool will automatically copy your logo to the correct assets folder.</p>
  <img id="preview" src="" alt="Logo Preview" style="display:none;">
  <div id="status"></div>
  <button class="btn" onclick="runSetup()">▶ Run Setup</button>
</div>

<script>
function runSetup() {
  const statusEl = document.getElementById('status');
  const preview = document.getElementById('preview');

  // Load the original image
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    try {
      // Draw to canvas to get base64
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const dataURL = canvas.toDataURL('image/png');

      // Show preview
      preview.src = dataURL;
      preview.style.display = 'block';

      // Create logo-data.js content
      const jsContent = `// Auto-generated by Logo Setup Tool\n(function() {\n  var LOGO = "${dataURL}";\n  function setLogos() {\n    document.querySelectorAll('.logo-highlight-img, .nav-logo-img').forEach(function(el) {\n      el.src = LOGO;\n    });\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', setLogos);\n  } else {\n    setLogos();\n  }\n})();\n`;

      // Trigger download of the JS file
      const blob = new Blob([jsContent], { type: 'text/javascript' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'logo-data.js';

      // Instruct user to save in scripts folder
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      statusEl.innerHTML = '<div class="status success">✅ Download started!<br><br>Save <strong>logo-data.js</strong> to:<br><code style="font-size:0.75rem; word-break:break-all;">C:\\Users\\huawei\\.gemini\\antigravity\\scratch\\deeply-rooted\\scripts\\</code></div>';
    } catch (e) {
      statusEl.innerHTML = '<div class="status error">❌ Error: ' + e.message + '</div>';
    }
  };
  img.onerror = function() {
    statusEl.innerHTML = '<div class="status error">❌ Could not load logo from source path.</div>';
  };
  img.src = 'file:///C:/Users/huawei/.gemini/antigravity/brain/0d0d767a-87b5-44b9-930f-972860940dd4/media__1777039340307.png?' + Date.now();
}
</script>
</body>
</html>
